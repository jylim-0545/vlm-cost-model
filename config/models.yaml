# Target VLM dimensions — see CLAUDE.md Section 3.
# Byte math (BF16) is DERIVED from these, never hardcoded elsewhere:
#   vision_token_bytes = hidden_size * dtype.bytes
#   kv_token_bytes     = 2 * num_layers * num_kv_heads * head_dim * dtype.bytes   (2 = key+value)
# InternVL dims confirmed from config.json on disk (2026-06-02). LLaVA-OV excluded.

dtype:
  name: bfloat16
  bytes: 2

models:
  qwen2.5-vl-7b:
    repo_id: Qwen/Qwen2.5-VL-7B-Instruct
    llm_backbone: Qwen2.5-7B
    hidden_size: 3584
    num_layers: 28
    num_kv_heads: 4
    head_dim: 128
    vision_encoder: "custom ViT ~670M (window attn)"
    per_frame_tokens: dynamic        # resolution-dependent, large
    trust_remote_code: false

  qwen3-vl-8b:
    repo_id: Qwen/Qwen3-VL-8B-Instruct
    llm_backbone: Qwen3-8B
    hidden_size: 4096
    num_layers: 36
    num_kv_heads: 8
    head_dim: 128
    vision_encoder: "SigLIP2-SO-400M (+DeepStack)"
    per_frame_tokens: dynamic
    trust_remote_code: false

  internvl3.5-4b:
    repo_id: OpenGVLab/InternVL3_5-4B   # capitalized: this is the cache dir that resolves (complete, 2 shards)
    llm_backbone: Qwen3-4B
    hidden_size: 2560
    num_layers: 36
    num_kv_heads: 8
    head_dim: 128
    vision_encoder: "InternViT-300M (pixel-shuffle)"
    per_frame_tokens: 256
    trust_remote_code: true

  internvl3.5-8b:
    repo_id: openGVLab/InternVL3_5-8B   # lowercase: this is the cache dir with full weights (capitalized OpenGVLab-8B is incomplete)
    llm_backbone: Qwen3-8B
    hidden_size: 4096
    num_layers: 36
    num_kv_heads: 8
    head_dim: 128
    vision_encoder: "InternViT-300M (pixel-shuffle)"
    per_frame_tokens: 256            # ~256 / patch
    trust_remote_code: true

  internvl3.5-14b:
    repo_id: openGVLab/InternVL3_5-14B   # lowercase: matches the only complete cache dir
    llm_backbone: Qwen3-14B
    hidden_size: 5120
    num_layers: 40
    num_kv_heads: 8
    head_dim: 128
    vision_encoder: "InternViT-300M (pixel-shuffle)"
    per_frame_tokens: 256
    trust_remote_code: true

  llava-ov-7b:
    repo_id: llava-hf/llava-onevision-qwen2-7b-ov-hf
    llm_backbone: Qwen2-7B          # same dims as Qwen2.5-VL-7B -> KV 56KB, token 7KB, ratio 8x
    hidden_size: 3584
    num_layers: 28
    num_kv_heads: 4
    head_dim: 128
    vision_encoder: "SigLIP-384"
    per_frame_tokens: 196            # bilinear-pooled, resolution-independent (measured: 3137 @16f)
    trust_remote_code: false
